name: Weight Drift Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  weight-drift:
    name: Evaluation Weight Drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for hardcoded weight tables in agent files
        run: |
          set -euo pipefail
          # The single source of truth for axis weights is
          # src/platxa_agent_generator/templates/evaluation-criteria.yaml.
          # Agent .md files must reference it, not duplicate weight values.
          # A row of the form "| <axis> | <float> |" indicates drift.
          if grep -EHn '^\|[[:space:]]*[A-Za-z_]+[[:space:]]*\|[[:space:]]*[0-9]+\.[0-9]+[[:space:]]*\|' agents/*.md; then
            echo ""
            echo "ERROR: Hardcoded weight tables found in agent files (above)."
            echo "Source of truth is src/platxa_agent_generator/templates/evaluation-criteria.yaml."
            echo "Remove the table rows and reference the YAML via EvaluationRubric.load_default()."
            exit 1
          fi
          echo "OK: No weight tables in agent files."
