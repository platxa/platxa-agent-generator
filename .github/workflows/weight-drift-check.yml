name: Weight Drift Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  weight-drift:
    name: Evaluation Weight Drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Check for weight drift
        run: python -m platxa_agent_generator.weight_drift_check
