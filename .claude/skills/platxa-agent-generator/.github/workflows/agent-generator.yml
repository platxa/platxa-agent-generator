name: Agent Generator Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'templates/**'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'templates/**'

jobs:
  test-generator:
    name: Test Agent Generator
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pyright pyyaml
          pip install -r requirements.txt || true

      - name: Run generator tests
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=scripts \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  test-catalog:
    name: Test Agent Catalog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Test catalog listing
        run: |
          python -c "
          from scripts.agent_catalog import list_agents, CATEGORIES

          print('Available Categories:')
          for cat, desc in CATEGORIES.items():
              agents = list_agents(category=cat)
              print(f'  {cat}: {len(agents)} agents')

          print()
          print('All Agents:')
          for agent in list_agents():
              print(f'  - {agent.name} [{agent.category}] v{agent.version}')
          "

      - name: Test catalog generation
        run: |
          python -c "
          from scripts.agent_catalog import get_agent, generate_agent_content

          # Test each agent generates valid content
          from scripts.agent_catalog import AGENT_CATALOG

          for name, template in AGENT_CATALOG.items():
              content = generate_agent_content(template)

              # Verify frontmatter
              assert content.startswith('---'), f'{name}: Missing frontmatter'
              assert '# ' in content, f'{name}: Missing header'

              # Verify minimum length (production-grade)
              if template.workflow_steps:
                  assert len(content) > 2000, f'{name}: Content too short for production template'

              print(f'  ✓ {name}: {len(content)} chars')

          print()
          print('All catalog agents generate valid content!')
          "

  test-dry-run:
    name: Test Dry Run Mode
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Test dry run generation
        run: |
          python -c "
          from scripts.dry_run import dry_run

          # Test dry run for a simple agent
          result = dry_run(
              name='test-agent',
              description='A test agent for CI',
              tools=['Read', 'Grep'],
              pattern='prompt-chaining',
          )

          print(f'Dry run result:')
          print(f'  Agent: {result.agent_name}')
          print(f'  Files: {len(result.files)}')
          print(f'  Total size: {result.total_size} bytes')

          assert result.agent_name == 'test-agent'
          assert len(result.files) > 0
          print()
          print('Dry run test passed!')
          "

  validate-quality:
    name: Validate Quality Scoring
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Test quality scoring
        run: |
          python -c "
          from scripts.quality_scorer import score_quality

          # Test with a well-formed agent definition
          good_agent = '''---
          name: test-agent
          description: A well-documented test agent for quality validation
          tools: Read, Grep, Glob
          ---

          # Test Agent

          ## Overview

          This agent performs testing tasks with comprehensive documentation.

          ## Workflow

          1. Analyze input
          2. Process data
          3. Return results

          ## Examples

          ### Example 1: Basic Usage

          **User:** Test something

          **Agent:** [Performs testing]

          ## Output Format

          Structured JSON response.
          '''

          result = score_quality(good_agent)
          print(f'Quality Score: {result.total_score:.1f}/10')
          print(f'Grade: {result.grade}')
          print(f'Passed: {result.passed}')

          # Production agents should pass quality threshold
          assert result.total_score >= 5.0, 'Basic agent should score at least 5.0'
          print()
          print('Quality scoring test passed!')
          "
